name: Job Alert Bot v2

on:
  schedule:
    # Hourly alerts — runs every hour at :00 UTC
    - cron: '0 * * * *'
    # Weekly digest — every Sunday at 9:00 AM UTC (2am PST)
    - cron: '0 9 * * 0'
  # Lets you trigger manually from the Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'hourly'
        type: choice
        options:
          - hourly
          - weekly-digest

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit seen_jobs.json fallback

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run hourly alerts ─────────────────────────────────────────────
      - name: Fetch jobs and send alerts (hourly)
        if: github.event.schedule == '0 * * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'hourly')
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GIST_ID:             ${{ secrets.GIST_ID }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      # ── 5. Run weekly digest ─────────────────────────────────────────────
      - name: Send weekly digest (Sunday)
        if: github.event.schedule == '0 9 * * 0' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'weekly-digest')
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GIST_ID:             ${{ secrets.GIST_ID }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
        run: python main.py --weekly-digest

      # ── 6. Commit seen_jobs.json fallback (if Gist not configured) ───────
      - name: Commit seen_jobs.json (local fallback)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push 2>/dev/null || true
